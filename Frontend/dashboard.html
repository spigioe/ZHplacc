<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>platZH - Vezérlőpult</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Saját CSS-ek -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages/todos.css">
    <link rel="stylesheet" href="css/pages/timetable.css">
    <link rel="stylesheet" href="css/pages/subjects.css">
    <link rel="stylesheet" href="css/pages/assessments.css">
    <link rel="stylesheet" href="css/pages/dashboard.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <!-- iOS (Apple) specifikus beállítások, hogy ott is appként viselkedjen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="img/icon-192.png">
    <meta name="apple-mobile-web-app-title" content="platZH">
    <meta name="mobile-web-app-capable" content="yes">
    <script>
        const savedTheme = localStorage.getItem("zhub-theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
    </script>
</head>
<body>

<div class="app-layout">
    <!-- BAL OSZLOP (MOBILON ALSÓ MENÜSÁV) -->
    <aside class="sidebar">
        <div class="sidebar-logo-area">
            <h1 class="title is-4 has-text-link mb-0">plat<span class="has-text-white">ZH</span>.</h1>
        </div>
        
        <div class="menu is-flex-grow-1">
            <ul class="menu-list">
                <li><a href="#dashboard" class="nav-item is-active px-4 py-3"><i class="fa-solid fa-house mr-3"></i> <span>Vezérlőpult</span></a></li>
                <li><a href="#timetable" class="nav-item px-4 py-3"><i class="fa-solid fa-calendar-week mr-3"></i> <span>Órarend</span></a></li>
                <li><a href="#subjects" class="nav-item px-4 py-3"><i class="fa-solid fa-book-bookmark mr-3"></i> <span>Tantárgyak</span></a></li>
                <li><a href="#assessments" class="nav-item px-4 py-3"><i class="fa-solid fa-file-pen mr-3"></i> <span>Számonkérések</span></a></li>
                <li><a href="#todos" class="nav-item px-4 py-3"><i class="fa-solid fa-list-check mr-3"></i> <span>Teendők</span></a></li>
            </ul>
        </div>

        <div class="mt-auto">
            <ul class="menu-list px-3">
                <li><a href="#help" id="nav-help-btn" class="nav-item px-4 py-3 cursor-pointer"><i class="fa-solid fa-circle-question mr-3"></i> Súgó</a></li>
                <li><a id="nav-sync-btn" class="nav-item px-4 py-3 cursor-pointer"><i class="fa-solid fa-rotate mr-3"></i> Szinkronizálás</a></li>
                <li><a id="theme-toggle" class="nav-item px-4 py-3 cursor-pointer"><i class="fa-solid fa-moon mr-3"></i> Sötét mód</a></li>
                <li><a id="nav-settings-btn" class="nav-item px-4 py-3 cursor-pointer"><i class="fa-solid fa-gear mr-3"></i> Beállítások</a></li>
            </ul>
            
            <div class="user-profile-card">
                <div style="width: 40px; height: 40px; background-color: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">ZH</div>
                <div style="line-height: 1.2;">
                    <p class="has-text-white has-text-weight-bold is-size-6 mb-0" id="user-display-name">Felhasználó</p>
                    <p class="has-text-grey is-size-7 mb-0" id="user-display-email">email@email.com</p>
                </div>
                <div class="ml-auto">
                    <button class="button is-small is-ghost has-text-danger p-0" id="logout-btn" title="Kijelentkezés">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </div>
    </aside>

    <!-- KÖZÉPSŐ FŐ RÉSZ -->
    <div class="main-wrapper">
        <header class="topbar is-flex is-align-items-center is-justify-content-space-between px-4" style="border-bottom: 1px solid var(--bulma-border); background-color: var(--bulma-background); min-height: 55px; height: 55px;">
            
            <!-- BAL OLDAL -->
            <div class="is-flex is-align-items-center">
                <!-- MOBIL: platZH logó -->
                <h1 class="title is-5 mb-0 has-text-link is-hidden-tablet">plat<span class="has-text-grey-dark">ZH</span>.</h1>
                
                <!-- ASZTAL: Dinamikus Oldalcím és Dátum -->
                <div class="is-hidden-mobile is-flex is-align-items-center">
                    <span class="icon has-text-grey-light mr-2" id="topbar-page-icon"><i class="fa-solid fa-house"></i></span>
                    <h2 class="title is-6 mb-0 has-text-grey-dark has-text-weight-bold" id="page-title">Vezérlőpult</h2>
                    
                    <span class="tag is-link is-light is-rounded ml-4 has-text-weight-semibold" id="topbar-date-widget" style="letter-spacing: 0.5px;">
                        <!-- A JS tölti ki a mai dátummal -->
                    </span>
                </div>
            </div>

            <!-- JOBB OLDAL: Gombok -->
            <div class="is-flex is-align-items-center" style="gap: 5px;">
                <!-- Mobilos kijelentkezés gomb (Csak mobilon) -->
                <button class="button is-ghost is-small is-hidden-tablet px-2" id="mobile-logout-btn" title="Kijelentkezés">
                    <i class="fa-solid fa-right-from-bracket has-text-danger fa-flip-horizontal fa-lg"></i>
                </button>
                
                <!-- Mobilos Súgó gomb (Csak mobilon) -->
                <button class="button is-ghost is-small is-hidden-tablet px-2" id="mobile-help-btn" title="Súgó">
                    <i class="fa-solid fa-circle-question has-text-info fa-lg"></i>
                </button>
                
                <!-- Mobilos beállítások gomb (Csak mobilon) -->
                <button class="button is-ghost is-small is-hidden-tablet px-2" id="mobile-settings-btn" title="Beállítások">
                    <i class="fa-solid fa-gear has-text-grey-dark fa-lg"></i>
                </button>
                
                
            </div>
        </header>

        <main id="router-view">
            <div class="is-flex is-justify-content-center is-align-items-center" style="height: 100%;">
                <div class="loader is-loading is-large"></div>
            </div>
        </main>
    </div>
</div>

<div id="toast-container"></div>

<!-- IDE FOGJA A JAVASCRIPT BEMÁSOLNI A MODÁLOKAT! -->
<div id="modal-container"></div>

<script type="module" src="js/core/app.js"></script>
</body>
</html>
